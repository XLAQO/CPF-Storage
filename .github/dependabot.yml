version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      springboot-safe-updates:
        patterns:
          - "org.springframework.boot*"
        update-types:
          - "minor"
          - "patch"
      other-maven-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "org.springframework.boot*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-docker-dependencies:
        patterns:
          - "*"
